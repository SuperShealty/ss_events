<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';">
    <link rel="stylesheet" href="styles.css">
    <title>Event Planner</title>
</head>
<body>
    <header role="banner">
        <h1 class="main-title">Event Planner</h1>
    </header>
    <main role="main">
        <section class="event-section">
            <h2 class="event-title">Upcoming Events</h2>
            <ul class="event-list">
                <li class="event-item" aria-label="Event 1 details">Event 1</li>
                <li class="event-item" aria-label="Event 2 details">Event 2</li>
            </ul>
        </section>
    </main>
    <footer role="contentinfo">
        <p>&copy; 2026 SuperShealty</p>
    </footer>
    <script src="app.js" async></script>
</body>
</html>
